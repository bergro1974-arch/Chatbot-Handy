<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Local Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #eaeaea;
            --user-blue: #007acc; --ai-grey: #2c2c2c; --brain-color: #00d2ff;
            --accent-green: #28a745; --reset-red: #a72828;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .chat-container { width: 100%; max-width: 850px; height: 100vh; background: var(--card-bg); display: flex; flex-direction: column; }
        .chat-header { padding: 12px 15px; background: #252525; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; gap: 10px; }
        .header-title { font-weight: bold; color: var(--brain-color); font-size: 16px; }
        .profile-dropdown { padding: 8px; background: #111; color: var(--text-color); border: 1px solid #555; border-radius: 8px; flex-grow: 1; }
        .new-chat-btn { padding: 8px 12px; background: transparent; color: var(--text-color); border: 1px solid #555; border-radius: 8px; cursor: pointer; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { background: var(--user-blue); align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: var(--ai-grey); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #444; }
        .thinking-msg { display: flex; align-items: center; gap: 12px; color: var(--brain-color); background: none !important; border: none !important; }
        .brain-avatar { font-size: 26px; animation: brainPulse 1.6s infinite ease-in-out; }
        @keyframes brainPulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.15); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
        .input-area { display: flex; padding: 12px 15px; background: #252525; gap: 10px; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom, 12px); }
        input { flex: 1; padding: 14px; border: 1px solid #444; border-radius: 8px; background: #111; color: white; font-size: 16px; outline: none; }
        #send-btn { padding: 0 20px; background: var(--accent-green); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #send-btn:disabled { background: #444; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="header-title">LM STUDIO</div>
        <select id="profile-select" class="profile-dropdown">
            <option value="assistant.md">Standard Assistent</option>
            <option value="rechtsberater.md">Rechtsberater (FM)</option>
            <option value="programmierer.md">Programmierer</option>
        </select>
        <button class="new-chat-btn" onclick="startNewChat()">+ Neu</button>
    </div>
    <div id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Frag mich was..." autocomplete="off">
        <button id="send-btn">Senden</button>
    </div>
</div>

<script>
    // WICHTIG: Prüfe, ob diese IP noch aktuell ist!
    const API_URL = "http://192.168.178.29:1234/v1/chat/completions";
    const md = window.markdownit({ html: false, breaks: true });

    let systemPrompt = { role: "system", content: "Du bist ein hilfreicher Assistent." };
    let chatHistory = [];

    async function loadProfile() {
        const selectedFile = document.getElementById('profile-select').value;
        
        // Direkte Zuweisung der Logik (Fallback), falls Dateien fehlen
        if (selectedFile === 'rechtsberater.md') {
            systemPrompt.content = "Du agierst als spezialisierter Rechtsberater für österreichisches Wirtschaftsrecht (Facility Management).";
        } else if (selectedFile === 'programmierer.md') {
            systemPrompt.content = "Du bist ein erfahrener Senior Software Entwickler.";
        } else {
            systemPrompt.content = "Du bist ein hilfreicher Assistent.";
        }

        // Chat Historie initialisieren
        if (chatHistory.length === 0) {
            chatHistory = [{ ...systemPrompt }];
        } else {
            chatHistory[0] = { ...systemPrompt };
        }
        console.log("Profil geladen:", systemPrompt.content);
    }

    function startNewChat() {
        if (confirm("Neuen Chat starten?")) {
            chatHistory = [{ ...systemPrompt }];
            document.getElementById('chat-window').innerHTML = '';
            appendMessage('ai', "Bereit für einen neuen Chat!", true);
        }
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        chatHistory.push({ role: "user", content: text });
        appendMessage('user', text, false);
        input.value = '';
        toggleInput(false);

        const thinkingDiv = appendThinkingIndicator();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: chatHistory,
                    temperature: 0.7
                })
            });

            if (!response.ok) throw new Error("Server antwortet nicht (CORS/IP?)");

            const data = await response.json();
            const reply = data.choices[0].message.content;

            chatHistory.push({ role: "assistant", content: reply });
            thinkingDiv.remove();
            appendMessage('ai', reply, true);

        } catch (err) {
            thinkingDiv.remove();
            appendMessage('ai', "❌ Fehler: " + err.message, false);
        } finally {
            toggleInput(true);
        }
    }

    function appendMessage(role, text, useMarkdown) {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = useMarkdown ? md.render(text) : text;
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function appendThinkingIndicator() {
        const win = document.getElementById('chat-window');
        const div = document.createElement('div');
        div.className = 'msg ai thinking-msg';
        div.innerHTML = '<span class="brain-avatar">🧠</span><span>Denke nach...</span>';
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
        return div;
    }

    function toggleInput(enable) {
        document.getElementById('send-btn').disabled = !enable;
        document.getElementById('user-input').disabled = !enable;
    }

    // Event Listener korrigiert
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });
    document.getElementById('profile-select').addEventListener('change', loadProfile);

    window.onload = () => {
        loadProfile();
        appendMessage('ai', "System bereit. Wie kann ich helfen?", true);
    };
</script>
</body>
</html>
